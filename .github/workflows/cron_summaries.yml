name: Daily Summaries Trigger 📊

on:
  schedule:
    # Runs every day at 15:00 UTC (18:00 Turkey Time)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  trigger_summaries:
    name: Trigger Daily Summaries API
    runs-on: ubuntu-latest

    steps:
    - name: Call Cron API for Summaries
      env:
        CRON_SECRET: ${{ secrets.CRON_SECRET }}
      run: |
        # Use secret from GitHub secrets if defined, otherwise fallback to the default key
        SECRET="${CRON_SECRET:-parkexpert-cron-secret-key-998877}"
        curl -X GET "https://parkexpertabonelik.net/api/cron_reminders?run=summaries" \
             -H "Authorization: Bearer $SECRET" \
             -H "Accept: application/json"
