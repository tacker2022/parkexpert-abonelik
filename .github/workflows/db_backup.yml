name: Database Backup 🛡️

on:
  schedule:
    # Runs every day at 03:00 UTC (06:00 Turkey Time)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions panel

jobs:
  backup:
    name: Backup Supabase to Cloudflare R2 & Google Drive
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install PostgreSQL 17 Client
      run: |
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
        sudo apt-get update
        sudo apt-get install -y postgresql-client-17

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-api-python-client pandas openpyxl psycopg2-binary sqlalchemy

    - name: Prepare Filenames and Run pg_dump
      env:
        DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: |
        # Generate unified timestamped filenames
        TS=$(date +%Y-%m-%d-%H%M%S)
        FILENAME="backup-$TS.dump"
        EXCEL_FILENAME="backup-$TS.xlsx"
        
        echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        echo "EXCEL_FILENAME=$EXCEL_FILENAME" >> $GITHUB_ENV
        
        # Run pg_dump in custom compressed binary format using the explicit PG 17 path
        /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" -F c -b -v -f "$FILENAME"
        
        # Verify file size is not empty
        if [ ! -s "$FILENAME" ]; then
          echo "Error: Backup file is empty!"
          exit 1
        fi
        
        echo "Database backup dump completed successfully: $FILENAME"

    - name: Export Database Tables to Excel
      env:
        DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: |
        python scripts/db_to_excel.py "$DB_URL" "${{ env.EXCEL_FILENAME }}"

    - name: Configure AWS CLI (S3 API compatibility for Cloudflare R2)
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
        aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
        aws configure set default.region auto

    - name: Upload Backups to Cloudflare R2
      env:
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET_NAME }}
      run: |
        # Upload .dump and .xlsx files using AWS CLI
        aws s3 cp "${{ env.FILENAME }}" "s3://$R2_BUCKET/${{ env.FILENAME }}" --endpoint-url "$R2_ENDPOINT"
        aws s3 cp "${{ env.EXCEL_FILENAME }}" "s3://$R2_BUCKET/${{ env.EXCEL_FILENAME }}" --endpoint-url "$R2_ENDPOINT"
        echo "Successfully uploaded backups to Cloudflare R2"

    - name: Upload Backups to Google Drive
      env:
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      run: |
        # Upload both .dump and .xlsx files to Google Drive
        python scripts/upload_to_drive.py "${{ env.FILENAME }}" "$GOOGLE_DRIVE_FOLDER_ID"
        python scripts/upload_to_drive.py "${{ env.EXCEL_FILENAME }}" "$GOOGLE_DRIVE_FOLDER_ID"
